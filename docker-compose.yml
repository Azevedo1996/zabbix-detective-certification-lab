services:
  django:
    build: .
    container_name: zabbix_detective_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_game &&
             python manage.py seed_simulados &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8989:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-zabbix-detective-local}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,django}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-America/Sao_Paulo}
      SQLITE_NAME: ${SQLITE_NAME:-/app/data/db.sqlite3}
      ZABBIX_URL: ${ZABBIX_URL:-http://zabbix-web:8080/api_jsonrpc.php}
      ZABBIX_USER: ${ZABBIX_USER:-Admin}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-zabbix}
    volumes:
      - .:/app
      - django_data:/app/data
    networks:
      - zabbix_detective_lab
    depends_on:
      zabbix-web:
        condition: service_started
      zabbix-server:
        condition: service_started

  zabbix-db:
    image: postgres:16-alpine
    container_name: zabbix_detective_zabbix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix}
    volumes:
      - zabbix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-zabbix} -d $${POSTGRES_DB:-zabbix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - zabbix_detective_lab

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix_detective_zabbix_server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix}
      ZBX_STARTPOLLERS: ${ZBX_STARTPOLLERS:-5}
      ZBX_STARTPREPROCESSORS: ${ZBX_STARTPREPROCESSORS:-3}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE:-128M}
      ZBX_HISTORYCACHESIZE: ${ZBX_HISTORYCACHESIZE:-64M}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE:-32M}
    depends_on:
      zabbix-db:
        condition: service_healthy
    ports:
      - "10051:10051"
    volumes:
      - zabbix_server_modules:/var/lib/zabbix/modules
      - zabbix_server_export:/var/lib/zabbix/export
    networks:
      - zabbix_detective_lab

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix_detective_zabbix_web
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_NAME: Zabbix Detective Lab
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix}
      PHP_TZ: ${PHP_TZ:-America/Sao_Paulo}
    depends_on:
      zabbix-db:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    ports:
      - "4000:8080"
    networks:
      - zabbix_detective_lab

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: zabbix_detective_zabbix_agent
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_HOSTNAME: zabbix-agent-lab
    depends_on:
      - zabbix-server
    networks:
      - zabbix_detective_lab

volumes:
  django_data:
    name: zabbix_detective_django_data
  zabbix_pgdata:
  zabbix_server_modules:
  zabbix_server_export:

networks:
  zabbix_detective_lab:
    name: zabbix_detective_lab
    driver: bridge
