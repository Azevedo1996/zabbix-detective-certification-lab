{% extends 'base.html' %}{% block content %}<h1>Histórico de simulados</h1><div class="card"><table><tr><th>Início</th><th>Certificação</th><th>Simulado</th><th>Status</th><th>Nota</th><th></th></tr>{% for a in attempts %}<tr><td>{{ a.started }}</td><td>{{ a.cert }}</td><td>{{ a.title }}</td><td>{{ a.status }}</td><td>{{ a.score }}%</td><td><a href="{% url 'simulados:result' a.id %}">Abrir</a></td></tr>{% empty %}<tr><td colspan="6">Sem tentativas.</td></tr>{% endfor %}</table></div>{% endblock %}
